services:
  relay-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bitfun-relay
    restart: unless-stopped
    ports:
      - "9700:9700"
    environment:
      - RELAY_PORT=9700
      - RELAY_STATIC_DIR=/app/static
      - RELAY_ROOM_TTL=3600
    volumes:
      - ./static:/app/static:ro
